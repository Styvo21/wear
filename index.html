<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COOLFITS · premium fashion</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* === style.css === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f4f6fa;
      color: #111;
      line-height: 1.5;
      opacity: 0;
      animation: pageFadeIn 0.6s ease forwards;
    }
    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* main theme: black/white + sky blue & orange accents */
    :root {
      --sky: #4aa9ff;
      --orange: #ff8a4c;
      --sky-glow: rgba(74, 169, 255, 0.2);
      --orange-glow: rgba(255, 138, 76, 0.2);
      --dark: #121212;
      --light: #ffffff;
      --card-shadow: 0 20px 30px -10px rgba(0,0,0,0.1), 0 8px 15px rgba(0,0,0,0.05);
    }

    /* loading spinner (disappears after page load) */
    #loader-wrapper {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s;
    }
    #loader-wrapper.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .spinner {
      width: 55px;
      height: 55px;
      border: 6px solid #eee;
      border-top: 6px solid var(--sky);
      border-right: 6px solid var(--orange);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* layout */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* header + admin lock simulation */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.02);
      border-bottom: 2px solid rgba(74,169,255,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--sky) 0%, var(--orange) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo span { color: #121212; background: none; -webkit-background-clip: unset; background-clip: unset; }

    .admin-btn {
      background: white;
      border: 1.5px solid var(--sky);
      color: var(--dark);
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px var(--sky-glow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .admin-btn:hover {
      background: linear-gradient(145deg, var(--sky), var(--orange));
      border-color: transparent;
      color: white;
      transform: scale(1.02);
      box-shadow: 0 15px 20px -8px var(--orange);
    }

    /* headline */
    .hero {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }
    .hero h1 {
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      font-weight: 900;
      background: linear-gradient(125deg, #121212 20%, var(--sky) 50%, var(--orange) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
      animation: glowPulse 3s infinite;
    }
    @keyframes glowPulse {
      0% { filter: drop-shadow(0 0 5px rgba(74,169,255,0.3)); }
      50% { filter: drop-shadow(0 0 18px rgba(255,138,76,0.5)); }
      100% { filter: drop-shadow(0 0 5px rgba(74,169,255,0.3)); }
    }

    /* product grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem 1.5rem;
      margin: 3rem 0 5rem;
    }
    .product-card {
      background: var(--light);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: all 0.35s cubic-bezier(0.15,0.75,0.45,1);
      position: relative;
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      opacity: 0;
      transform: translateY(18px);
      animation: cardReveal 0.5s ease forwards;
    }
    .product-card:nth-child(odd) { animation-delay: 0.1s; }
    .product-card:nth-child(even) { animation-delay: 0.2s; }
    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .product-card:hover {
      transform: translateY(-14px) scale(1.02);
      box-shadow: 0 30px 40px -12px rgba(255,138,76,0.4), 0 0 0 2px rgba(74,169,255,0.3);
    }
    .product-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--orange);
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.3rem 1rem;
      border-radius: 60px;
      box-shadow: 0 4px 12px rgba(255,138,76,0.6);
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1.2;
      object-fit: cover;
      background: #eef2f7;
      transition: transform 0.7s ease;
    }
    .product-card:hover .product-img {
      transform: scale(1.04);
    }
    .product-info {
      padding: 1.5rem 1.2rem 1.5rem;
      background: white;
    }
    .product-name {
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
      letter-spacing: -0.3px;
      color: #121212;
    }
    .product-price {
      font-weight: 800;
      color: var(--orange);
      font-size: 1.5rem;
      margin: 0.4rem 0 1rem;
    }
    .product-price::before {
      content: 'Ksh ';
      font-size: 1rem;
      font-weight: 500;
      color: #555;
    }
    .buy-btn {
      background: linear-gradient(145deg, #121212, #2d2d2d);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.9rem 0;
      width: 100%;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    }
    .buy-btn:not(:disabled):hover {
      background: linear-gradient(145deg, var(--sky), var(--orange));
      transform: scale(0.98);
      box-shadow: 0 8px 18px var(--orange-glow);
    }
    .buy-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: #aaa;
    }

    /* admin panel (hidden by default) */
    .admin-panel {
      background: white;
      border-radius: 40px 40px 20px 20px;
      padding: 2rem;
      margin: 2rem 0 4rem;
      box-shadow: var(--card-shadow);
      border: 2px solid var(--sky);
      display: none;
      animation: slideDown 0.4s;
    }
    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .admin-panel.visible { display: block; }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-header h2 {
      background: linear-gradient(145deg, var(--sky), var(--orange));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lock-badge {
      background: #121212;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .add-product-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 1rem;
      background: #f1f5ff;
      padding: 1.8rem;
      border-radius: 36px;
      margin-bottom: 2.5rem;
    }
    .add-product-form input, .add-product-form button {
      padding: 0.9rem 1.2rem;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    .add-product-form button {
      background: linear-gradient(145deg, var(--sky), #3c96e0);
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      grid-column: span 1;
    }
    .add-product-form button:hover {
      background: linear-gradient(145deg, var(--orange), #ff7622);
    }
    .admin-product-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .admin-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafc;
      padding: 0.8rem 1.8rem;
      border-radius: 100px;
      flex-wrap: wrap;
    }
    .admin-actions {
      display: flex;
      gap: 0.6rem;
    }
    .admin-actions button {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      transition: 0.2s;
    }
    .edit-btn { color: var(--sky); background: #e5f0ff; }
    .delete-btn { color: var(--orange); background: #ffeae1; }
    .sold-toggle { background: #12121210; color: #121212; font-size: 0.8rem; }
    .admin-actions button:hover { filter: brightness(0.9); transform: scale(1.1); }

    /* modal */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }
    .modal.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-card {
      background: white;
      max-width: 400px;
      width: 90%;
      padding: 2.5rem;
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      text-align: center;
    }
    .modal-card input {
      width: 100%;
      padding: 1rem;
      margin: 1.5rem 0 1rem;
      border-radius: 60px;
      border: 1.5px solid #ddd;
      font-size: 1rem;
    }
    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .modal-actions button {
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(145deg, var(--sky), var(--orange));
      color: white;
    }

    /* responsiveness */
    @media (max-width: 680px) {
      .container { padding: 0 1rem; }
      .add-product-form { grid-template-columns: 1fr; }
      .admin-row { border-radius: 30px; gap: 1rem; justify-content: center; }
      header { padding: 1rem; }
    }

    /* misc */
    .confirm-popup {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: #121212;
      color: white;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      box-shadow: 0 10px 30px rgba(255,138,76,0.5);
      z-index: 3000;
      animation: popIn 0.2s;
    }
    @keyframes popIn { 0% { opacity:0; bottom:0; } 100% { opacity:1; bottom:30px; } }
    footer { text-align: center; padding: 2rem; color: #555; }
  </style>
</head>
<body>
  <div id="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <header>
    <div class="logo"><span>COOL</span>FITS</div>
    <button class="admin-btn" id="adminLoginBtn"><i class="fas fa-lock"></i> Admin</button>
  </header>

  <main class="container">
    <div class="hero">
      <h1>Welcome to COOLFITS</h1>
      <p style="color:#2c2c2c;">streetwear · premium · fresh</p>
    </div>

    <!-- products grid -->
    <div id="productGrid" class="product-grid"></div>

    <!-- admin panel (hidden by default) -->
    <div id="adminPanel" class="admin-panel">
      <div class="admin-header">
        <h2><i class="fas fa-shield-alt" style="margin-right:8px;"></i>admin dashboard</h2>
        <span class="lock-badge" id="sessionBadge">🔒 exclusive session</span>
      </div>
      <div class="add-product-form">
        <input type="text" id="newName" placeholder="Product name" value="Oversized tee">
        <input type="number" id="newPrice" placeholder="Price Ksh" value="1890">
        <input type="text" id="newImage" placeholder="Image URL" value="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400">
        <button id="addProductBtn"><i class="fas fa-plus-circle"></i> Add</button>
      </div>
      <div id="adminProductList" class="admin-product-list"></div>
    </div>
  </main>

  <footer>© COOLFITS — instant whatsapp ordering</footer>

  <!-- admin login modal -->
  <div id="adminModal" class="modal">
    <div class="modal-card">
      <i class="fas fa-user-shield" style="font-size:3rem; color:var(--sky);"></i>
      <h3 style="margin:0.5rem 0;">admin access</h3>
      <input type="password" id="adminPass" placeholder="enter password (demo: 1234)" value="">
      <div class="modal-actions">
        <button class="btn-primary" id="submitAdminPass"><i class="fas fa-arrow-right"></i> unlock</button>
        <button id="closeModalBtn">cancel</button>
      </div>
    </div>
  </div>

  <!-- confirmation popup (hidden by default) -->
  <div id="confirmPopup" class="confirm-popup" style="display:none;">✔️ item deleted</div>

  <script>
    // ================= script.js =================
    (function() {
      // --- global state / localStorage simulation ---
      const STORAGE_KEY = 'coolfits_products';
      const ADMIN_SESSION_KEY = 'coolfits_admin_active';
      
      // base products (attractive demo items)
      const defaultProducts = [
        { id: 'p1', name: 'Skyline hoodie', price: 3250, image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400', sold: false },
        { id: 'p2', name: 'Orange nylon jacket', price: 5450, image: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400', sold: false },
        { id: 'p3', name: 'Slim denim', price: 3890, image: 'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400', sold: true },
        { id: 'p4', name: 'Vintage logo tee', price: 1690, image: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400', sold: false },
        { id: 'p5', name: 'Cargo pants', price: 4290, image: 'https://images.unsplash.com/photo-1506477331477-33d5d8b3dc85?w=400', sold: false },
        { id: 'p6', name: 'Puffer vest', price: 5190, image: 'https://images.unsplash.com/photo-1584273143981-41c073dfe8f8?w=400', sold: false }
      ];

      // load products or init
      let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultProducts;
      // ensure each product has 'sold' field
      products = products.map(p => ({ ...p, sold: p.sold || false }));

      // admin session simulation (only one device)
      let adminActive = sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true'; // using sessionStorage for tab-isolation demo

      // DOM elements
      const loader = document.getElementById('loader-wrapper');
      const productGrid = document.getElementById('productGrid');
      const adminPanel = document.getElementById('adminPanel');
      const adminLoginBtn = document.getElementById('adminLoginBtn');
      const adminModal = document.getElementById('adminModal');
      const adminPassInput = document.getElementById('adminPass');
      const submitAdmin = document.getElementById('submitAdminPass');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const addBtn = document.getElementById('addProductBtn');
      const newName = document.getElementById('newName');
      const newPrice = document.getElementById('newPrice');
      const newImage = document.getElementById('newImage');
      const adminListDiv = document.getElementById('adminProductList');
      const sessionBadge = document.getElementById('sessionBadge');
      const confirmPopup = document.getElementById('confirmPopup');

      // helper: save to localStorage
      function saveProducts() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
      }

      // render public grid
      function renderPublicGrid() {
        const availableProducts = products.filter(p => !p.sold);
        let html = '';
        availableProducts.forEach(prod => {
          html += `
            <div class="product-card">
              <img src="${prod.image}" alt="${prod.name}" class="product-img" loading="lazy">
              <div class="product-info">
                <div class="product-name">${prod.name}</div>
                <div class="product-price">${prod.price}</div>
                <button class="buy-btn" data-id="${prod.id}" data-name="${prod.name}" data-price="${prod.price}" data-img="${prod.image}">
                  <i class="fab fa-whatsapp"></i> Buy Now
                </button>
              </div>
            </div>
          `;
        });
        productGrid.innerHTML = html || '<p style="text-align:center;">🔥 fresh drops coming soon</p>';
      }

      // render admin list (editable)
      function renderAdminList() {
        let html = '';
        products.forEach(prod => {
          html += `
            <div class="admin-row" data-id="${prod.id}">
              <div style="display:flex; align-items:center; gap:10px;">
                <img src="${prod.image}" style="width:45px; height:45px; border-radius:30px; object-fit:cover;">
                <span><strong>${prod.name}</strong> Ksh ${prod.price}</span>
                ${prod.sold ? '<span style="background:orange; padding:2px 10px; border-radius:40px; color:white; font-size:0.7rem;">sold</span>' : ''}
              </div>
              <div class="admin-actions">
                <button class="sold-toggle" data-id="${prod.id}" data-action="toggle"><i class="fas fa-tag"></i> ${prod.sold ? 'mark available' : 'mark sold'}</button>
                <button class="edit-btn" data-id="${prod.id}" data-action="edit"><i class="fas fa-pen"></i></button>
                <button class="delete-btn" data-id="${prod.id}" data-action="delete"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          `;
        });
        adminListDiv.innerHTML = html || '<p>no products</p>';
      }

      // open whatsapp
      function buyViaWhatsapp(name, price, imgUrl) {
        const phone = '2547496373';
        const message = `Hello COOLFITS 👕%0AI would like to order:%0AProduct Name: ${name}%0APrice: Ksh ${price}%0AProduct Image: ${imgUrl}`;
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
      }

      // --- event listeners ---
      productGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('.buy-btn');
        if (!btn) return;
        const id = btn.dataset.id;
        const prod = products.find(p => p.id === id);
        if (prod && !prod.sold) {
          buyViaWhatsapp(prod.name, prod.price, prod.image);
        }
      });

      // admin modal logic
      adminLoginBtn.addEventListener('click', () => {
        if (adminActive) {
          // if already admin, just show panel (hide if needed)
          adminPanel.classList.add('visible');
        } else {
          adminModal.classList.add('show');
        }
      });

      closeModalBtn.addEventListener('click', () => adminModal.classList.remove('show'));

      submitAdmin.addEventListener('click', () => {
        const pass = adminPassInput.value;
        if (pass === '1234') { // simple password
          // check if some other device/tab has lock (simulated via sessionStorage + custom flag)
          if (sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true') {
            alert('Admin already active in this browser tab.');
          } else {
            // simulate lock: set session storage, and flag
            sessionStorage.setItem(ADMIN_SESSION_KEY, 'true');
            adminActive = true;
            adminPanel.classList.add('visible');
            adminModal.classList.remove('show');
            renderAdminList();
          }
        } else {
          alert('wrong password (demo: 1234)');
        }
        adminPassInput.value = '';
      });

      // hide modal if click outside? fine.

      // admin add product
      addBtn.addEventListener('click', () => {
        if (!adminActive) { alert('login first'); return; }
        const name = newName.value.trim();
        const price = parseFloat(newPrice.value);
        const image = newImage.value.trim();
        if (!name || !price || !image) { alert('fill all fields'); return; }
        const newId = 'prod_' + Date.now() + Math.random().toString(36).substring(2);
        products.push({ id: newId, name, price, image, sold: false });
        saveProducts();
        renderPublicGrid();
        renderAdminList();
        // reset fields
        newName.value = ''; newPrice.value = ''; newImage.value = '';
      });

      // admin actions (toggle, edit, delete)
      adminListDiv.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn || !adminActive) return;
        const action = btn.dataset.action;
        const prodId = btn.dataset.id;
        const product = products.find(p => p.id === prodId);
        if (!product) return;

        if (action === 'delete') {
          if (confirm('Delete item? (confirmation popup)')) {
            products = products.filter(p => p.id !== prodId);
            saveProducts();
            renderPublicGrid();
            renderAdminList();
            // show popup
            confirmPopup.style.display = 'block';
            setTimeout(() => { confirmPopup.style.display = 'none'; }, 2000);
          }
        } else if (action === 'toggle') {
          product.sold = !product.sold;
          saveProducts();
          renderPublicGrid();
          renderAdminList();
        } else if (action === 'edit') {
          const newPrice = prompt('Edit price (Ksh):', product.price);
          if (newPrice && !isNaN(newPrice)) {
            product.price = parseFloat(newPrice);
            saveProducts();
            renderPublicGrid();
            renderAdminList();
          }
        }
      });

      // close admin panel if not active (but we also rely on session)
      function checkAdminSession() {
        if (sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true') {
          adminActive = true;
          adminPanel.classList.add('visible');
          renderAdminList();
        } else {
          adminActive = false;
          adminPanel.classList.remove('visible');
        }
        sessionBadge.innerText = adminActive ? '🔒 exclusive session (active)' : '🔒 no active session';
      }

      // simulate logout on other devices: if user opens new tab, sessionStorage is separate, so second tab can login but this tab remains active.
      // but we want "no other device can access" -> meaning only one sessionStorage. we handle by warning at login, but here we allow only if not set.
      // for same browser different tabs, each tab has its sessionStorage, so we can't block entirely without server. simulation: we show warning on login if already active in this origin.
      // to enhance, we could set local storage lock, but that would conflict. we stick to sessionStorage and message.
      
      // loading hide
      window.addEventListener('load', () => {
        setTimeout(() => { loader.classList.add('hidden'); }, 400);
        renderPublicGrid();
        checkAdminSession();
      });

      // refresh admin list if open
      window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_KEY) {
          products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultProducts;
          renderPublicGrid();
          if (adminActive) renderAdminList();
        }
        // session lock not cross-tab
      });

      // manual session check
      checkAdminSession();
    })();
  </script>
</body>
</html>
