<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COOLFITS - E-Commerce</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
}
header {
    background: black;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    font-size: 24px;
    font-weight: bold;
    color: #ff7eb3;
}
.admin-btn {
    background: #ff7eb3;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}
.container { padding: 20px; }
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 20px;
}
.card {
    background:white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.card img {
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}
button {
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}
.buy { background:green; color:white; width:100%; margin-top:10px; }
.hidden { display:none; }
form input { width:100%; padding:8px; margin:5px 0; }
.dashboard {
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}
h2 { margin-top:0; }
.status { font-weight:bold; }
</style>
</head>
<body>

<header>
    <div class="logo">Welcome to COOLFITS 👕</div>
    <button class="admin-btn" id="adminAccess">Admin</button>
</header>

<div class="container">

<!-- USER AUTH -->
<div id="auth">
<h2>User Login / Register</h2>
<input type="text" id="phone" placeholder="Phone Number">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- DELIVERY TRACKING -->
<div id="tracking">
<h2>Track Order</h2>
<input type="text" id="trackId" placeholder="Enter Tracking ID">
<button onclick="trackOrder()">Track</button>
<p>Status: <span id="trackStatus">---</span></p>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="hidden">
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="dashboard" class="dashboard hidden">
<h2>Admin Dashboard</h2>
<h3>Add Product</h3>
<input type="text" id="pname" placeholder="Product Name">
<input type="number" id="pprice" placeholder="Price">
<input type="file" id="pimage">
<button onclick="addProduct()">Add Product</button>

<h3>Activity Monitor</h3>
<div id="activity"></div>
<button onclick="logoutAdmin()">Logout Admin</button>
</div>

</div>

<script>
// Data storage
let users = JSON.parse(localStorage.getItem("users")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let logs = JSON.parse(localStorage.getItem("logs")) || [];

// Save data
function saveData(){
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("products", JSON.stringify(products));
    localStorage.setItem("orders", JSON.stringify(orders));
    localStorage.setItem("logs", JSON.stringify(logs));
}

// Register
function register(){
    let phone = document.getElementById("phone").value;
    let pass = document.getElementById("password").value;
    if(phone && pass){
        if(users.find(u=>u.phone===phone)){
            alert("User already exists");
            return;
        }
        users.push({phone,pass});
        saveData();
        alert("Registered Successfully");
    } else { alert("Enter phone and password"); }
}

// Login
function login(){
    let phone = document.getElementById("phone").value;
    let pass = document.getElementById("password").value;
    let user = users.find(u=>u.phone===phone && u.pass===pass);
    if(user){
        alert("Login Successful");
        logs.push("User "+phone+" logged in");
        saveData();
        displayProducts();
    } else { alert("Invalid Details"); }
}

// Admin login button
document.getElementById("adminAccess").onclick = function(){
    if(localStorage.getItem("adminLogged")) return;
    document.getElementById("adminLogin").classList.toggle("hidden");
}

// Admin login
function adminLogin(){
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;
    if(user==="coolfits" && pass==="1212"){
        localStorage.setItem("adminLogged",true);
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("adminLogin").classList.add("hidden");
        logs.push("Admin logged in");
        saveData();
        showLogs();
    } else { alert("Wrong credentials"); }
}

// Logout Admin
function logoutAdmin(){
    localStorage.removeItem("adminLogged");
    location.reload();
}

// Add product
function addProduct(){
    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let file = document.getElementById("pimage").files[0];
    if(!name || !price || !file){ alert("Enter all fields"); return; }
    let reader = new FileReader();
    reader.onload = function(){
        products.push({name,price,image:reader.result,sold:false});
        saveData();
        displayProducts();
    }
    reader.readAsDataURL(file);
}

// Display products
function displayProducts(){
    let list=document.getElementById("productList");
    list.innerHTML="";
    products.forEach((p,index)=>{
        if(!p.sold){
            list.innerHTML+=`
            <div class="card">
                <img src="${p.image}">
                <h3>${p.name}</h3>
                <p>Ksh ${p.price}</p>
                <button class="buy" onclick="buyItem(${index})">BUY</button>
                <button onclick="markSold(${index})">Mark Sold</button>
                <button onclick="deleteProduct(${index})">Delete</button>
            </div>
            `;
        }
    });
}

// Buy product
function buyItem(index){
    let p = products[index];
    let trackingId = "TRK" + Math.floor(Math.random()*100000);
    orders.push({product:p,trackingId,status:"Pending"});
    logs.push(`Order placed: ${p.name} - TrackingID: ${trackingId}`);
    saveData();
    alert(`Order placed! Tracking ID: ${trackingId}`);
    window.open(`https://wa.me/254717496373?text=Order:%20${p.name}%20Ksh%20${p.price}%20TrackingID:%20${trackingId}`);
}

// Mark sold
function markSold(index){
    products[index].sold=true;
    saveData();
    displayProducts();
}

// Delete product
function deleteProduct(index){
    products.splice(index,1);
    saveData();
    displayProducts();
}

// Show logs
function showLogs(){
    document.getElementById("activity").innerHTML = logs.join("<br>");
}

// Track order
function trackOrder(){
    let id = document.getElementById("trackId").value;
    let order = orders.find(o=>o.trackingId===id);
    document.getElementById("trackStatus").innerText = order ? order.status : "Not found";
}

// Load admin if already logged in
if(localStorage.getItem("adminLogged")){
    document.getElementById("dashboard").classList.remove("hidden");
    showLogs();
}

// Initial products display
displayProducts();

</script>
</body>
</html>
